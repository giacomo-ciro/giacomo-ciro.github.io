- title: "Autoresearch HFT"
  date: "30-31 May 2026"
  tags: "Quantitative Finance, Machine Learning, AI Agents"
  description: "A weekend challenge to trade six months of nanosecond-precision HFT order book data. Using a modular, agent-driven research harness, self-looping agents tested 30 strategies in under 48 hours, going from losing money to a fully automated strategy earning over €25k/month."
  links:
    Code: https://github.com/giacomo-ciro/autoresearch-hft
  thumbnail: "260530.png"

- title: "Multi-Modal Real Estate Search MCP"
  date: "18-19 Apr 2026"
  tags: "Python, AWS, MCP"
  description: "As our Datathon 2026 submission, we built a multi-stage, multi-modal search pipeline that transforms natural language queries into ranked real estate listings for the Swiss market. The result is an MCP server fully deployed on AWS enabling any compatible LLM to query real-time listings."
  links:
    Code: https://github.com/alexcaldarone/datathon-2026
    Datathon: https://www.datathon.ai/
    Demo: https://github.com/alexcaldarone/datathon-2026/blob/main/assets/demo.gif 
  thumbnail: "260418.png"

- title: "More Efficient Text Diffusion via Length Prediction"
  date: "Mar 2026"
  tags: "Natural Language Processing, Machine Learning, Optimization"
  description: "Improved computational efficiency of an 8B diffusion language model by predicting output sequence length before generation, dynamically cropping the context window to cut computation with minimal performance impact. Submitted to ICML 2026."
  links:
    Code: "https://github.com/giacomo-ciro/diffusion-llms"
    arXiv: "https://arxiv.org/abs/2603.06123"
    OpenReview: "https://openreview.net/forum?id=gnQVz850h6&nesting=2&sort=date-desc"
  thumbnail: "260300.png"

- title: "Knowledge Graph of the Italian Supreme Court's Rulings"
  date: "Aug 2025"
  tags: "Python, Neo4j, Knowledge Graph"
  description: "During my internship at Lexroom.ai, I designed and developed a proprietary ETL pipeline to construct a knowledge graph from over 5,000 unstructured Italian Supreme Court's rulings. Implemented an out-of-core, efficient PageRank-based algorithm to assign relevance scores to graph nodes."
  thumbnail: "250801.png"

- title: "Do AI and Human Experts See Pneumonia the Same Way?"
  date: "May 2025"
  tags: "Computer Vision, Explainable AI, Medical Imaging"
  description: "We compared CNNs with experienced professionals on pediatric chest X-rays to understand if deep learning models identify pneumonia using the same visual cues as doctors. The answer is no, and high accuracy doesn't guarantee human-interpretable reasoning."
  links:
    Code: "https://github.com/davide-beltrame/medimg-saliency-benchmark"
    Report: "/assets/docs/do_ai_and_human_experts_see_pneumonia_the_same_way.pdf"
  thumbnail: "250523.png"

